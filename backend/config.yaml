data_source:
  provider: adsblol        # options: "adsblol" or "opensky"

zones:
  bounding_box_km: 13
  focus_radius_km: 7

# A focused aircraft below max_altitude_m is assumed to be taking off from or
# landing at HOME_AIRPORT_IATA (set in .env); if its route doesn't touch that
# airport, it's flagged as suspicious and double-checked against a second
# route data source (see services/enrichment.py).
route_sanity:
  max_altitude_m: 3000

opensky:
  poll_interval_seconds: 6

adsblol:
  poll_interval_seconds: 6

# Aircraft whose callsign starts with any of these prefixes are filtered out
# entirely (e.g. ground vehicles/GSE that show up alongside real aircraft).
# Matching is case-insensitive; add more prefixes as needed.
filters:
  ignored_callsign_prefixes:
    - AIRSIDE
    - FOAM

alerts:
  boring_types:
    - B737
    - B738
    - B739
    - B38M
    - B39M
    - A318
    - A319
    - A320
    - A321
    - A20N
    - A21N
  emergency_squawks:
    - "7500"
    - "7600"
    - "7700"