data_source:
  provider: adsblol        # options: "adsblol" or "opensky"

zones:
  bounding_box_km: 13
  focus_radius_km: 7

# A focused aircraft below max_altitude_m is assumed to be taking off from or
# landing at HOME_AIRPORT_IATA (set in .env); if its route doesn't touch that
# airport, it's flagged as suspicious and double-checked against a second
# route data source (see services/enrichment.py).
route_sanity:
  max_altitude_m: 3000

opensky:
  poll_interval_seconds: 6

adsblol:
  poll_interval_seconds: 6

# Aircraft whose callsign starts with any of these prefixes are filtered out
# entirely (e.g. ground vehicles/GSE that show up alongside real aircraft).
# Matching is case-insensitive; add more prefixes as needed.
filters:
  ignored_callsign_prefixes:
    - AIRSIDE
    - FOAM
    - FIELD
    - TRUCK
    - YELLOW

# Non-airline aircraft (military, government, police, medical, etc.) whose
# callsigns don't follow the standard 3-letter ICAO airline codes (those
# live in backend/services/data/airlines.py instead). Matched by callsign
# prefix, case-insensitive, longest prefix wins; only checked as a fallback
# for callsigns that don't already match a known airline. Add/edit entries
# freely - no code changes needed.
#   prefix:         callsign prefix to match, e.g. "MEDIC" matches "MEDIC01";
#                   the prefix must be immediately followed by a digit (or
#                   nothing), so e.g. "R" matches "R05" but not "ROF123"
#   name:           shown as the "airline" field in the UI
#   logo_url:       optional direct link to a logo/picture for the info
#                   panel; omit to show no logo (there's no IATA code to
#                   look one up by for these)
#   is_helicopter:  optional, defaults to false; forces the helicopter map
#                   icon on even if the reported aircraft type isn't
#                   recognized as a helicopter (see aircraft_types.py)
special_aircraft:
  - prefix: MEDIC
    name: OMSZ Helicopter
    is_helicopter: true
    logo_url: https://hu.wikipedia.org/wiki/F%C3%A1jl:Insignia_Hungary_OMSZ_v1.svg
  - prefix: NARVL
    name: Hungarian Air Force
    logo_url: https://hu.wikipedia.org/wiki/F%C3%A1jl:Roundel_of_Hungary.svg
  - prefix: R
    name: Hungarian Police
    logo_url: https://commons.wikimedia.org/wiki/File:Insignia_Hungary_Police.svg
    is_helicopter: true
  - prefix: HUF
    name: Hungarian Air Force
    logo_url: https://hu.wikipedia.org/wiki/F%C3%A1jl:Roundel_of_Hungary.svg
  - prefix: RCH
    name: U.S. Air Force
    logo_url: https://commons.wikimedia.org/wiki/File:US_Air_Force_Logo_Solid_Colour.svg

alerts:
  common_types:
    - B737
    - B738
    - B739
    - B38M
    - B39M
    - A318
    - A319
    - A320
    - A321
    - A20N
    - A21N
  emergency_squawks:
    - "7500"
    - "7600"
    - "7700"